name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can GCS)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc, upload artifact len cloud storage
  train:
    name: Train
    needs: test              # Chi chay khi job test qua
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          ls -la /tmp/sa-key.json
          cat /tmp/sa-key.json | head -10

      - name: Configure DVC credentials
        run: |
          dvc remote modify myremote credentialpath /tmp/sa-key.json
          dvc remote list -v

      - name: Pull data with DVC
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
        run: dvc pull -v

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          python - <<'EOF'
          import json
          with open("outputs/metrics.json") as f:
              metrics = json.load(f)
          accuracy = metrics["accuracy"]
          print(f"Accuracy: {accuracy}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"accuracy={accuracy}\n")
          EOF

      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          
          os.environ["GOOGLE_APPLICATION_CREDENTIALS"] = "/tmp/sa-key.json"
          client = storage.Client()
          bucket = client.bucket("${{ secrets.CLOUD_BUCKET }}")
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print("Model uploaded to GCS")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train             # Chi chay khi job train qua
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          print(f"Accuracy: {accuracy}")
          if accuracy < 0.70:
              print(f"ERROR: Accuracy {accuracy} < 0.70 threshold")
              exit(1)
          print(f"SUCCESS: Accuracy {accuracy} >= 0.70")
          EOF

  # JOB 4: Trien khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval              # Chi chay khi job eval qua
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl http://localhost:8000/health || exit 1
